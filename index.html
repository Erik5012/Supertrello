<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Supertrello — Cronos System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--bg2:#141414;--bg3:#1A1A1A;--bg4:#222;--bg5:#2A2A2A;--gold:#FFD700;--gold2:#C9A84C;--golda:rgba(255,215,0,0.12);--wht:#FFFFFF;--wht2:#BFBFBF;--wht3:rgba(255,255,255,0.3);--red:#FF4D4D;--reda:rgba(255,77,77,0.15);--redb:rgba(255,77,77,0.06);--org:#E07A30;--orga:rgba(224,122,48,0.15);--grn:#4CAF7D;--grna:rgba(76,175,125,0.15);--bdr:rgba(255,255,255,0.07);--bdrg:rgba(255,215,0,0.22)}
body{background:var(--bg);color:var(--wht);font-family:system-ui,sans-serif;font-size:13px;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{background:var(--bg2);border-bottom:1px solid var(--bdrg);padding:0 20px;display:flex;align-items:center;height:52px;gap:16px;flex-shrink:0}
#logo{font-size:17px;font-weight:700;color:var(--gold);letter-spacing:3px;display:flex;align-items:center;gap:6px}
#logo-sub{font-size:9px;color:var(--wht3);font-weight:400;letter-spacing:2px}
#main-nav{display:flex;gap:2px;flex:1;justify-content:center}
.mn{background:none;border:none;color:var(--wht2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;transition:.2s;position:relative}
.mn:hover{color:var(--wht);background:var(--bg3)}
.mn.active{color:var(--gold)}
.mn.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--gold);border-radius:2px 2px 0 0}
#hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.upill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:4px 10px 4px 4px}
.uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.uname{font-size:11px;color:var(--wht2)}
.ntb{background:var(--gold);color:#000;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.ntb:hover{background:#FFE94D}
#fbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:8px 20px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}
#srch{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--wht);padding:6px 12px;font-size:12px;width:180px;outline:none}
#srch:focus{border-color:var(--bdrg)}
.fp{background:none;border:1px solid var(--bdr);color:var(--wht2);padding:5px 11px;border-radius:20px;cursor:pointer;font-size:11px;transition:.2s}
.fp:hover{border-color:var(--bdrg);color:var(--gold)}
.fp.active{background:var(--golda);border-color:var(--gold);color:var(--gold)}
.fp.td-btn{border-color:rgba(224,122,48,0.4);color:var(--org)}
.fp.td-btn.active{background:var(--orga);border-color:var(--org);color:var(--org)}
#fbar-r{margin-left:auto}
.fba{background:none;border:1px solid var(--bdr);color:var(--wht3);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:.2s}
.fba:hover{border-color:var(--bdrg);color:var(--gold)}
#mc{flex:1;overflow:hidden;display:flex;flex-direction:column}
#bv{flex:1;overflow:hidden;display:flex;flex-direction:column}
#dv{display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:14px}
#pv{display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:6px}
#lv{display:none;flex:1;overflow-y:auto;padding:16px;flex-direction:column;gap:5px}
#board{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;flex:1;align-items:flex-start}
.col{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;min-width:215px;width:215px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%}
.col-hdr{padding:11px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;flex-shrink:0}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer}
.ctitle{font-size:12px;font-weight:500;flex:1;cursor:text;padding:2px 4px;border-radius:3px;color:var(--wht);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctitle:hover{background:var(--bg4)}
.ctinput{font-size:12px;font-weight:500;color:var(--wht);background:var(--bg4);border:1px solid var(--bdrg);border-radius:4px;padding:2px 6px;width:100%;outline:none;font-family:inherit}
.ccnt{font-size:10px;color:var(--wht3);background:var(--bg4);padding:1px 6px;border-radius:8px;flex-shrink:0}
.cdel{background:none;border:none;color:var(--wht3);cursor:pointer;font-size:13px;padding:2px;border-radius:3px}
.cdel:hover{color:var(--red)}
.cards{padding:6px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1}
.cadd{margin:5px 6px 6px;border:1px dashed var(--bdr);background:none;color:var(--wht3);padding:6px;border-radius:6px;cursor:pointer;font-size:11px;text-align:center;transition:.2s}
.cadd:hover{border-color:var(--bdrg);color:var(--gold);background:var(--golda)}
.addcol{background:var(--bg2);border:1px dashed var(--bdrg);border-radius:10px;min-width:170px;width:170px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px;cursor:pointer;transition:.2s}
.addcol:hover{background:var(--golda);border-color:var(--gold)}
.addcol span{font-size:11px;color:var(--gold)}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:9px;cursor:pointer;transition:.2s;border-left:3px solid transparent}
.card:hover{border-color:var(--bdrg);background:var(--bg4);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,215,0,0.05)}
.card.urgent{border-left-color:var(--red);background:rgba(255,77,77,0.03)}
.card.high{border-left-color:var(--org)}
.card.medium{border-left-color:var(--gold2)}
.card.low{border-left-color:var(--grn)}
.card-img{width:100%;height:42px;border-radius:5px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--wht3)}
.ctit{font-size:12px;font-weight:500;color:var(--wht);margin-bottom:6px;line-height:1.4}
.clbls{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.lbl{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.lbl.prob{background:var(--reda);color:var(--red)}
.lbl.size{background:var(--orga);color:var(--org)}
.lbl.solved{background:var(--grna);color:var(--grn)}
.lbl.cat{background:var(--bg4);color:var(--wht3)}
.lbl.custom{background:rgba(91,143,212,0.15);color:#5B8FD4}
.lbl.tdlbl{background:var(--orga);color:var(--org)}
.chkbar{height:2px;background:var(--bg5);border-radius:1px;margin-bottom:5px;overflow:hidden}
.chkfill{height:100%;border-radius:1px;transition:.3s}
.cfoot{display:flex;align-items:center;gap:5px}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0}
.av-md{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.cdate{font-size:10px;color:var(--wht3);margin-left:auto}
.cdate.ov{color:var(--red)}
.cdate.td{color:var(--org);font-weight:500}
.pdesc-preview{font-size:10px;color:var(--red);margin-top:4px;line-height:1.4;font-style:italic}
.resp-selector{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.resp-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:2px solid var(--bdr);cursor:pointer;transition:.2s;flex:1;min-width:110px}
.resp-opt:hover{border-color:var(--bdrg);background:var(--bg3)}
.resp-opt.selected{border-color:var(--gold);background:var(--golda)}
.resp-name{font-size:12px;color:var(--wht);font-weight:500}
.resp-role{font-size:10px;color:var(--wht3)}
.resp-check{font-size:13px;color:var(--gold);margin-left:auto;opacity:0}
.resp-opt.selected .resp-check{opacity:1}
.meta-box{background:var(--bg2);border:1px solid var(--bdrg);border-radius:12px;padding:18px}
.meta-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.meta-title{font-size:14px;font-weight:500;color:var(--wht)}
.meta-sub{font-size:11px;color:var(--wht3);margin-top:2px}
.meta-status{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap}
.meta-status.hit{background:var(--grna);color:var(--grn)}
.meta-status.miss{background:var(--reda);color:var(--red)}
.meta-status.close{background:var(--orga);color:var(--org)}
.meta-nums{display:flex;align-items:baseline;gap:6px;margin-bottom:12px}
.meta-cur{font-size:32px;font-weight:700;color:var(--gold)}
.meta-sep{font-size:14px;color:var(--wht3)}
.meta-goal{font-size:16px;color:var(--wht3);font-weight:500}
.meta-bar-wrap{height:14px;background:var(--bg4);border-radius:7px;overflow:hidden;margin-bottom:6px}
.meta-bar{height:100%;border-radius:7px;transition:.5s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.meta-bar-lbl{font-size:10px;font-weight:600;color:#000}
.meta-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--wht3);margin-bottom:10px}
.meta-focus{font-size:12px;color:var(--wht2);padding:10px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid var(--gold);line-height:1.6;margin-top:10px}
.meta-inp-row{display:flex;gap:8px;margin-top:10px}
.meta-inp{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--wht);padding:6px 10px;font-size:13px;flex:1;outline:none;font-family:inherit}
.meta-inp:focus{border-color:var(--bdrg)}
.meta-btn{background:var(--gold);color:#000;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer}
.rank-row{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rbar-w{width:100px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.rbar{height:4px;border-radius:2px;background:var(--gold)}
.dsec{font-size:13px;font-weight:500;color:var(--wht);border-bottom:1px solid var(--bdr);padding-bottom:7px;margin-bottom:10px}
.prob-card{background:var(--bg2);border:1px solid rgba(255,77,77,0.25);border-left:3px solid var(--red);border-radius:8px;padding:12px 14px;cursor:pointer;transition:.2s;margin-bottom:5px}
.prob-card:hover{background:var(--redb)}
.prob-card.sz{border-left-color:var(--org);border-color:rgba(224,122,48,0.25)}
.prob-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}
.prob-desc-box{font-size:12px;color:var(--wht2);margin:6px 0;line-height:1.5;background:var(--bg3);border-radius:5px;padding:6px 8px}
.log-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:10px}
.log-txt{flex:1;font-size:12px;color:var(--wht2)}
.log-txt strong{color:var(--wht)}
.log-time{font-size:11px;color:var(--wht3)}
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
#mbg.open{display:flex}
#mod{background:var(--bg2);border:1px solid var(--bdrg);border-radius:12px;width:560px;max-width:95vw;padding:20px;margin:auto;flex-shrink:0}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.mt{font-size:15px;font-weight:500;color:var(--wht);flex:1;margin-right:10px;line-height:1.5}
.mx{background:none;border:none;color:var(--wht3);cursor:pointer;font-size:20px}
.mx:hover{color:var(--wht)}
.ms{font-size:10px;color:var(--wht3);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}
.mr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.mrl{font-size:11px;color:var(--wht3);width:88px;flex-shrink:0}
.mrv{font-size:12px;color:var(--wht)}
.msel{background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;color:var(--wht);padding:4px 8px;font-size:12px;cursor:pointer;outline:none;font-family:inherit}
.msel option{background:var(--bg2)}
.msel:focus{border-color:var(--bdrg)}
.minput{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--wht);padding:7px 10px;font-size:12px;outline:none;font-family:inherit;margin-bottom:4px}
.minput:focus{border-color:var(--bdrg)}
.mtarea{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--wht);padding:7px 10px;font-size:12px;outline:none;font-family:inherit;resize:vertical;min-height:56px}
.mtarea:focus{border-color:var(--bdrg)}
.mdesc{font-size:12px;color:var(--wht2);line-height:1.7;background:var(--bg3);border-radius:6px;padding:9px 11px}
.mimgs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px}
.mimg{border-radius:6px;height:58px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--wht3)}
.upzone{border:1px dashed var(--bdrg);border-radius:6px;padding:11px;text-align:center;cursor:pointer;font-size:11px;color:var(--wht3);transition:.2s;margin-bottom:4px}
.upzone:hover{background:var(--golda);color:var(--gold)}
.chki{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;color:var(--wht2)}
.chkb{width:15px;height:15px;border-radius:3px;border:1px solid var(--bdrg);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;cursor:pointer}
.chkb.done{background:var(--gold);border-color:var(--gold);color:#000}
.chk-del{background:none;border:none;color:var(--wht3);cursor:pointer;font-size:12px;margin-left:auto;padding:2px 4px;border-radius:3px}
.chk-del:hover{color:var(--red)}
.add-row{display:flex;gap:5px;margin-top:4px}
.comm{background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:4px}
.comm-meta{font-size:10px;color:var(--wht3);margin-bottom:3px}
.comm-txt{font-size:12px;color:var(--wht2)}
.lbl-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.ltog{padding:4px 9px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--bdr);background:none;color:var(--wht3);transition:.15s;font-family:inherit}
.ltog.on-prob{background:var(--reda);border-color:rgba(255,77,77,0.4);color:var(--red)}
.ltog.on-size{background:var(--orga);border-color:rgba(224,122,48,0.4);color:var(--org)}
.ltog.on-solved{background:var(--grna);border-color:rgba(76,175,125,0.4);color:var(--grn)}
.cust-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(91,143,212,0.15);color:#5B8FD4;border:1px solid rgba(91,143,212,0.3);cursor:pointer}
.cust-tag:hover{background:var(--reda);color:var(--red)}
.tline{display:flex;gap:7px;padding:4px 0 4px 10px;border-left:1px solid var(--bdr);margin-left:4px;font-size:11px;color:var(--wht3);position:relative}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--gold2);position:absolute;left:-4px;top:6px}
.mfoot{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.mbtn{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:.15s;border:1px solid var(--bdr);font-family:inherit}
.mbtn.pri{background:var(--gold);color:#000;font-weight:600;border-color:var(--gold)}
.mbtn.pri:hover{background:#FFE94D}
.mbtn.gh{background:none;color:var(--wht3)}
.mbtn.gh:hover{background:var(--bg3);color:var(--wht)}
#cp{display:none;position:fixed;background:var(--bg2);border:1px solid var(--bdrg);border-radius:8px;padding:8px;gap:5px;flex-wrap:wrap;width:116px;z-index:300}
#cp.open{display:flex}
.cdotc{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
.cdotc:hover{border-color:#fff;transform:scale(1.1)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

.mt-input{background:transparent;border:none;border-bottom:1px solid var(--bdrg);color:var(--wht);font-size:17px;font-weight:600;width:100%;outline:none;padding:2px 4px;margin-bottom:2px;}
.mt-input:focus{border-bottom-color:var(--gold);}
.date-input{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--wht);font-size:12px;padding:3px 6px;outline:none;cursor:pointer;}
.date-input:hover,.date-input:focus{border-color:var(--bdrg);}
.card.dragging{opacity:0.5;}
.cards.drag-over{background:var(--golda);border-radius:8px;}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div id="logo">⚡ <div><div>SUPERTRELLO</div><div id="logo-sub">CRONOS SYSTEM</div></div></div>
  <nav id="main-nav">
    <button class="mn active" onclick="setView('board',this)">Quadro</button>
    <button class="mn" onclick="setView('dash',this)">Dashboard</button>
    <button class="mn" onclick="setView('prob',this)">Central de Problemas</button>
    <button class="mn" onclick="setView('log',this)">Log</button>
  </nav>
  <div id="hdr-right">
    <div class="upill"><div class="uav" style="background:#3A1A6A;color:#C0A0F0">GA</div><span class="uname">Gabriel · Admin</span></div>
    <button class="ntb" onclick="openNew()">+ Nova Tarefa</button>
  </div>
</div>
<div id="fbar">
  <input id="srch" placeholder="🔍 Buscar..." oninput="renderBoard()">
  <button class="fp active" onclick="setF('all',this)">Todas</button>
  <button class="fp" onclick="setF('mine',this)">Minhas</button>
  <button class="fp td-btn" onclick="setF('today',this)">📅 Para Hoje</button>
  <button class="fp" onclick="setF('urgent',this)">Urgentes</button>
  <button class="fp" onclick="setF('problem',this)">Com problema</button>
  <div id="fbar-r"><button class="fba" onclick="addCol()">+ Coluna</button></div>
</div>
<div id="mc">
  <div id="bv"><div id="board"></div></div>
  <div id="dv"></div>
  <div id="pv">
    <div style="font-size:15px;font-weight:500;margin-bottom:3px">Central de Problemas</div>
    <div style="font-size:12px;color:var(--wht3);margin-bottom:14px">Todos os problemas — ordenados por prioridade</div>
    <div id="plist"></div>
  </div>
  <div id="lv">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px">Log de Atividades</div>
    <div id="llist"></div>
  </div>
</div>
<div id="mbg"><div id="mod"></div></div>
<div id="cp"></div>
</div>
<script>
const CCOLS=['#5B8FD4','#FFD700','#9090A8','#4CAF7D','#FF4D4D','#E07A30','#C9A84C','#5DCAA5','#D4537E','#7F77DD'];
const USERS={GA:{i:'GA',c:'#3A1A6A',t:'#C0A0F0',name:'Gabriel',role:'Gerente / Admin'},RO:{i:'RO',c:'#1A3A2A',t:'#5DCAA5',name:'Robson',role:'Expedição & Logística'},ER:{i:'ER',c:'#3A2A1A',t:'#EF9F27',name:'Erick',role:'Catálogo & Estoque'},GS:{i:'GS',c:'#1A2A3A',t:'#85B7EB',name:'GS',role:'Suporte & Devoluções'}};
const today=new Date().toISOString().split('T')[0];
const isOv=t=>t.due&&t.due<today&&t.status!=='done';
const isDT=t=>t.due===today&&t.status!=='done';
const fmt=()=>new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const fmtM=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
let cols=[{id:'todo',title:'A Fazer',color:'#5B8FD4'},{id:'doing',title:'Em Andamento',color:'#FFD700'},{id:'waiting',title:'Aguardando',color:'#9090A8'},{id:'done',title:'Concluído',color:'#4CAF7D'},{id:'overdue',title:'Vencido',color:'#FF4D4D'}];
let tasks=[

s Personalizadas</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${custH||'<span style="font-size:11px;color:var(--wht3)">Nenhuma</span>'}</div><div class="add-row"><input class="minput" id="cust-in" placeholder="Nome da etiqueta..." style="margin:0;flex:1"><button class="mbtn pri" onclick="addCustLbl(${t.id})" style="padding:6px 12px;font-size:11px">+ Adicionar</button></div><div class="ms">Checklist (${cd}/${cl})</div>${chkH}<div class="add-row"><input class="minput" id="chk-new" placeholder="Novo item..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')addChk(${t.id})"><button class="mbtn pri" onclick="addChk(${t.id})" style="padding:6px 12px;font-size:11px">+ Item</button></div>${commH?`<div class="ms">Comentários</div>${commH}`:''}<div class="ms">Novo Comentário</div><div class="add-row"><input class="minput" id="comm-new" placeholder="Escrever comentário..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')addComm(${t.id})"><button class="mbtn pri" onclick="addComm(${t.id})" style="padding:6px 12px;font-size:11px">Enviar</button></div><div class="ms">Timeline</div><div><div class="tline"><div class="tdot"></div>Tarefa criada</div>${t.status==='doing'?`<div class="tline"><div class="tdot"></div>Movida para Em Andamento</div>`:''}${hasPr?`<div class="tline"><div class="tdot" style="background:var(--red)"></div><span style="color:var(--red)">Problema registrado</span></div>`:''}${t.status==='done'?`<div class="tline"><div class="tdot" style="background:var(--grn)"></div><span style="color:var(--grn)">Concluída</span></div>`:''}</div><div class="mfoot"><button class="mbtn gh" onclick="closeM()">Fechar</button>${t.status!=='done'?`<button class="mbtn pri" onclick="quickDone(${t.id})">✓ Concluir</button>`:''}</div>`;

function addCol(){const id='col_'+Date.now();cols.push({id,title:'Nova Coluna',color:'#9090A8'});renderBoard();setTimeout(()=>startEdit(id),80);}
function renderDash(){const done=tasks.filter(t=>t.status==='done').length;const ov=tasks.filter(isOv).length;const prob=tasks.filter(t=>(t.labels||[]).some(l=>l==='prob'||l==='size')).length;const tdT=tasks.filter(isDT).length;const pct=tasks.length>0?Math.round(done/tasks.length*100):0;const uStats=Object.keys(USERS).map(uid=>{const mine=tasks.filter(t=>t.user===uid);const d=mine.filter(t=>t.status==='done').length;const p=mine.length>0?Math.round(d/mine.length*100):0;return{uid,u:USERS[uid],total:mine.length,done:d,late:mine.filter(isOv).length,p};}).sort((a,b)=>b.p-a.p);const mPct=Math.min(Math.round(metaVal/META*100),100);const hit=metaVal>=META,close=metaVal>=META*0.8&&!hit;const barColor=hit?'var(--grn)':close?'var(--org)':'var(--gold)';const statusTxt=hit?'META BATIDA ✅':close?'QUASE LÁ ⚡':'EM ANDAMENTO 📊';const statusCls=hit?'hit':close?'close':'miss';const focusTxt=hit?'🎉 Meta batida! Semana que vem: <strong>reparos, melhorias e novas ideias</strong>.':'📢 Meta ainda não batida. Foco total em <strong>vendas e conversão</strong>!';
document.getElementById('dv').innerHTML=`<div style="font-size:14px;font-weight:500">Dashboard — Visão Geral</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"><div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center"><div style="font-size:26px;font-weight:600;color:var(--gold)">${tasks.length}</div><div style="font-size:11px;color:var(--wht3)">Total de Tarefas</div></div><div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center"><div style="font-size:26px;font-weight:600;color:var(--grn)">${done}</div><div style="font-size:11px;color:var(--wht3)">Concluídas</div></div><div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center"><div style="font-size:26px;font-weight:600;color:var(--red)">${prob}</div><div style="font-size:11px;color:var(--wht3)">Com Problema</div></div><div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center"><div style="font-size:26px;font-weight:600;color:var(--org)">${tdT}</div><div style="font-size:11px;color:var(--wht3)">Para Hoje</div></div></div><div class="meta-box"><div class="meta-header"><div><div class="meta-title">🎯 Meta de Vendas Semanal</div><div class="meta-sub">Objetivo: ${fmtM(META)}/semana</div></div><span class="meta-status ${statusCls}">${statusTxt}</span></div><div class="meta-nums"><span class="meta-cur">${fmtM(metaVal)}</span><span class="meta-sep">de</span><span class="meta-goal">${fmtM(META)}</span></div><div class="meta-bar-wrap"><div class="meta-bar" style="width:${mPct}%;background:${barColor};min-width:${mPct>0?'4px':'0'}">${mPct>15?`<span class="meta-bar-lbl">${mPct}%</span>`:''}</div></div><div class="meta-marks"><span>R$ 0</span><span>${fmtM(META*0.5)}</span><span>${fmtM(META)}</span></div><div class="meta-focus">${focusTxt}</div><div class="meta-inp-row"><input class="meta-inp" id="meta-inp" type="number" placeholder="Valor vendido R$..." value="${metaVal||''}"><button class="meta-btn" onclick="updMeta()">Atualizar</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><div class="dsec">Ranking de Performance</div>${uStats.map((s,i)=>`<div class="rank-row"><div style="font-size:16px;width:24px">${['🥇','🥈','🥉','4º'][i]}</div><div class="av" style="background:${s.u.c};color:${s.u.t};width:22px;height:22px;font-size:9px">${s.u.i}</div><div style="flex:1"><div style="font-size:12px;font-weight:500">${s.u.name}</div><div style="font-size:10px;color:var(--wht3)">${s.done}/${s.total} · ${s.late} atr.</div></div><div class="rbar-w"><div class="rbar" style="width:${s.p}%"></div></div><div style="font-size:12px;color:var(--gold);font-weight:600;width:34px;text-align:right">${s.p}%</div></div>`).join('')}</div><div><div class="dsec">Performance Geral</div><div style="background:var(--bg2);border:1px solid var(--bdrg);border-radius:10px;padding:20px;text-align:center"><div style="font-size:40px;font-weight:700;color:var(--gold)">${pct}%</div><div style="font-size:11px;color:var(--wht3);margin:6px 0 12px">Tarefas concluídas</div><div style="height:8px;background:var(--bg4);border-radius:4px;overflow:hidden"><div style="height:8px;background:var(--gold);width:${pct}%;border-radius:4px;transition:.5s"></div></div></div></div></div>`;}
function updMeta(){const v=parseFloat(document.getElementById('meta-inp')?.value||0);metaVal=isNaN(v)?0:v;renderDash();}
function renderProbs(){const probs=tasks.filter(t=>(t.labels||[]).some(l=>l==='prob'||l==='size')).sort((a,b)=>({urgent:0,high:1,medium:2,low:3}[a.urgency]||2)-({urgent:0,high:1,medium:2,low:3}[b.urgency]||2));const getCol=id=>(cols.find(c=>c.id===id)||{title:id}).title;document.getElementById('plist').innerHTML=probs.length===0?'<div style="text-align:center;color:var(--wht3);padding:50px">Nenhum problema ativo!</div>':probs.map(t=>{const sz=(t.labels||[]).includes('size')&&!(t.labels||[]).includes('prob');const u=USERS[t.user]||USERS.GA;return`<div class="prob-card${sz?' sz':''}" onclick="setView('board',document.querySelector('.mn'));openCard(${t.id})"><div style="display:flex;align-items:center;gap:10px;margin-bottom:${t.probDesc?'8':'0'}px"><div style="font-size:18px">${sz?'⚡':'⚠'}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--wht);margin-bottom:2px">${t.title}</div>${t.probTitle?`<div style="font-size:12px;color:${sz?'var(--org)':'var(--red)'};font-weight:500">${t.probTitle}</div>`:''}</div><span class="prob-badge" style="background:${sz?'var(--orga)':'var(--reda)'};color:${sz?'var(--org)':'var(--red)'}">${sz?'FALTA TAMANHO':'TENHO UM PROBLEMA'}</span></div>${t.probDesc?`<div class="prob-desc-box">${t.probDesc}</div>`:''}<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><div class="av" style="background:${u.c};color:${u.t};width:18px;height:18px;font-size:8px">${u.i}</div><span style="font-size:11px;color:var(--wht3)">${u.name} · ${t.cat} · ${getCol(t.status)} · Prazo: ${t.due||'—'}</span></div></div>`;}).join('');}
function renderLog(){document.getElementById('llist').innerHTML=log.map(l=>`<div class="log-item"><span style="font-size:15px">${l.ico}</span><span class="log-txt">${l.txt}</span><span class="log-time">${l.dt}</span></div>`).join('');}
document.getElementById('bv').style.display='flex';
loadData();
renderBoard();
</script>
</body>
</html>
